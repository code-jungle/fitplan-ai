<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with subtle gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="aiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="80" fill="url(#bgGradient)"/>
  
  <!-- Subtle light effect in corners -->
  <circle cx="100" cy="100" r="150" fill="rgba(139, 92, 246, 0.1)" opacity="0.3"/>
  <circle cx="412" cy="412" r="120" fill="rgba(139, 92, 246, 0.08)" opacity="0.2"/>
  
  <!-- Main text container -->
  <g transform="translate(256, 256)">
    <!-- FitPlan text (white) -->
    <text x="0" y="-20" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="72" font-weight="bold" letter-spacing="-2">
      FitPlan
    </text>
    
    <!-- AI text (purple) -->
    <text x="0" y="60" text-anchor="middle" fill="url(#aiGradient)" font-family="Arial, sans-serif" font-size="72" font-weight="bold" letter-spacing="-2">
      AI
    </text>
  </g>
  
  <!-- Subtle accent elements -->
  <circle cx="128" cy="128" r="8" fill="rgba(139, 92, 246, 0.6)"/>
  <circle cx="384" cy="384" r="6" fill="rgba(139, 92, 246, 0.4)"/>
</svg>
